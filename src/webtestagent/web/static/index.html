<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVP Deep Agents 控制台</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --panel: rgba(20, 24, 33, 0.92);
        --panel-soft: rgba(31, 37, 50, 0.92);
        --panel-strong: rgba(15, 18, 25, 0.98);
        --text: #edf2ff;
        --muted: #9aa7bd;
        --line: rgba(255, 255, 255, 0.08);
        --accent: #7aa2ff;
        --accent-soft: rgba(122, 162, 255, 0.14);
        --ok: #6edb8f;
        --ok-soft: rgba(110, 219, 143, 0.14);
        --warn: #ffd36e;
        --warn-soft: rgba(255, 211, 110, 0.14);
        --err: #ff8f8f;
        --err-soft: rgba(255, 143, 143, 0.14);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(122, 162, 255, 0.18), transparent 32%),
          radial-gradient(circle at top right, rgba(110, 219, 143, 0.12), transparent 28%),
          linear-gradient(180deg, #0b0d12 0%, #0e1118 100%);
      }

      .app {
        display: grid;
        grid-template-columns: 340px minmax(420px, 1fr) 420px;
        gap: 18px;
        min-height: 100vh;
        padding: 18px;
      }

      .panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .panel-subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .panel-body {
        padding: 18px 20px 20px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      input,
      textarea,
      button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel-soft);
        color: var(--text);
        font: inherit;
      }

      input,
      textarea {
        padding: 12px 14px;
        outline: none;
        transition: border-color 0.16s ease, background 0.16s ease;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(122, 162, 255, 0.5);
        background: rgba(35, 42, 58, 0.96);
      }

      textarea {
        min-height: 300px;
        resize: vertical;
        line-height: 1.55;
      }

      button {
        padding: 12px 14px;
        cursor: pointer;
        font-weight: 700;
        transition: transform 0.12s ease, opacity 0.12s ease, background 0.16s ease;
      }

      button:hover { transform: translateY(-1px); }
      button:disabled { opacity: 0.6; cursor: wait; transform: none; }

      .primary {
        background: linear-gradient(135deg, #8ab0ff 0%, #6f8fff 100%);
        color: #0f1630;
        border: 0;
      }

      .secondary {
        background: transparent;
        color: var(--text);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 112px;
        gap: 10px;
      }

      .status-card {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--panel-strong);
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .status-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
      }

      .status-running { color: var(--accent); background: var(--accent-soft); }
      .status-completed { color: var(--ok); background: var(--ok-soft); }
      .status-failed { color: var(--err); background: var(--err-soft); }
      .status-idle,
      .status-queued,
      .status-archived { color: var(--warn); background: var(--warn-soft); }

      .meta-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .meta-item {
        display: grid;
        gap: 2px;
      }

      .meta-item span {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .meta-item strong {
        font-size: 12px;
        word-break: break-word;
      }

      .preview-shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100%;
      }

      .preview-stage {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 480px;
        height: calc(100vh - 170px);
        margin: 18px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(20, 24, 34, 0.95) 0%, rgba(11, 13, 18, 0.98) 100%);
        overflow: hidden;
      }

      .preview-stage img {
        max-width: calc(100% - 28px);
        max-height: calc(100% - 28px);
        border-radius: 16px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 24px;
      }

      .empty-state strong {
        display: block;
        color: var(--text);
        margin-bottom: 8px;
        font-size: 16px;
      }

      .screenshot-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 20px 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .screenshot-meta a {
        color: var(--accent);
        text-decoration: none;
      }

      .logs-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      .log-list {
        padding: 16px 16px 18px;
        overflow: auto;
      }

      .log-empty {
        display: grid;
        place-items: center;
        min-height: 220px;
        color: var(--muted);
        text-align: center;
        border: 1px dashed var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
      }

      .log-entry {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .log-entry + .log-entry {
        margin-top: 12px;
      }

      .log-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .log-kind {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .log-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .dot-agent { background: #8ab0ff; }
      .dot-tools { background: #6edb8f; }
      .dot-system { background: #ffd36e; }
      .dot-report { background: #ff9ad5; }
      .dot-other { background: #9aa7bd; }

      .log-time {
        color: var(--muted);
        font-size: 11px;
      }

      .log-title {
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
      }

      .log-summary {
        color: #d8e0f0;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
      }

      .log-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 11px;
      }

      .report-card {
        background: linear-gradient(180deg, rgba(255, 154, 213, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
      }

      @media (max-width: 1360px) {
        .app {
          grid-template-columns: 320px 1fr;
          grid-template-rows: auto auto;
        }
        .panel.logs {
          grid-column: 1 / -1;
          min-height: 360px;
        }
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }
        .preview-stage {
          height: 54vh;
          min-height: 320px;
        }
      }

      .session-options { margin-top: 0.5rem; }
      .session-options summary { cursor: pointer; font-size: 0.82rem; color: var(--text-muted, #888); user-select: none; }
      .session-checks { display: flex; gap: 1.2rem; }
      .session-checks label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; cursor: pointer; }
    
      .session-options { margin-top: 0.5rem; }
      .session-options summary { cursor: pointer; font-size: 0.82rem; color: var(--muted); user-select: none; }
      .session-checks { display: flex; gap: 1.2rem; }
      .session-checks label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Scenario</div>
            <div class="panel-subtitle">配置 URL 和测试场景，直接启动当前运行</div>
          </div>
        </div>
        <div class="panel-body stack">
          <div>
            <label for="url">目标 URL</label>
            <input id="url" placeholder="https://..." />
          </div>

          <div>
            <label for="scenario">测试场景</label>
            <textarea id="scenario" placeholder="输入模糊场景描述，或 JSON steps 数组"></textarea>
          </div>

          <details class="session-options">
            <summary>登录态持久化（可选）</summary>
            <div class="stack" style="margin-top:0.75rem">
              <div class="session-checks">
                <label><input type="checkbox" id="autoLoad" /> 自动导入登录态</label>
                <label><input type="checkbox" id="autoSave" /> 自动保存登录态</label>
              </div>
              <div>
                <label for="sessionAccountId">账号标识（可选，多账号时区分）</label>
                <input id="sessionAccountId" placeholder="如 alice" />
              </div>
            </div>
          </details>

          <div class="actions">
            <button id="startBtn" class="primary">启动运行</button>
            <button id="resetBtn" class="secondary">重置</button>
          </div>

          <div id="hint" class="panel-subtitle">支持模糊描述，也支持结构化 JSON steps。</div>

          <div class="status-card">
            <div class="status-row">
              <div id="statusPill" class="status-pill status-idle">idle</div>
            </div>
            <div class="meta-list">
              <div class="meta-item">
                <span>run id</span>
                <strong id="runIdText">-</strong>
              </div>
              <div class="meta-item">
                <span>当前 URL</span>
                <strong id="runUrlText">-</strong>
              </div>
              <div class="meta-item">
                <span>状态说明</span>
                <strong id="runStatusText">等待启动</strong>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">实时截图</div>
            <div class="panel-subtitle">自动跟随最新 screenshot 更新</div>
          </div>
        </div>
        <div class="preview-shell">
          <div id="previewBox" class="preview-stage">
            <div class="empty-state">
              <strong>暂无截图</strong>
              启动运行后，这里会持续刷新最新浏览器画面。
            </div>
          </div>
          <div class="screenshot-meta">
            <a id="openScreenshotLink" href="#" target="_blank" style="display:none">打开原图</a>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">日志输出</div>
            <div class="panel-subtitle">更直观地看 agent、tools 与结果输出</div>
          </div>
        </div>
        <div id="eventList" class="log-list">
          <div class="log-empty">启动运行后，这里会实时显示结构化日志。</div>
        </div>
      </section>
    </div>

    <script>

      const urlInput = document.getElementById('url');
      const scenarioInput = document.getElementById('scenario');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const hint = document.getElementById('hint');
      const statusPill = document.getElementById('statusPill');
      const runIdText = document.getElementById('runIdText');
      const runUrlText = document.getElementById('runUrlText');
      const runStatusText = document.getElementById('runStatusText');
      const previewBox = document.getElementById('previewBox');
      const openScreenshotLink = document.getElementById('openScreenshotLink');
      const eventList = document.getElementById('eventList');

      const state = { currentRunId: null, eventSource: null, screenshotTimer: null, lastScreenshotPath: null, ws: null, lastEventId: 0, eventPollTimer: null };

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      function formatTime(value) {
        if (!value) return '';
        try {
          const d = new Date(value);
          return d.toLocaleTimeString('zh-CN', { hour12: false });
        } catch { return value; }
      }

      function setStatus(status, text) {
        statusPill.className = 'status-pill status-' + status;
        statusPill.textContent = status;
        runStatusText.textContent = text || status;
      }

      function classifyEvent(event) {
        const ch = event.channel || '';
        const mode = event.mode || '';
        if (ch === 'system' && mode === 'report') return { dot: 'dot-report', kind: '结果摘要' };
        if (ch === 'system') return { dot: 'dot-system', kind: 'system' };
        if (ch === 'model') return { dot: 'dot-agent', kind: 'agent' };
        if (ch === 'tools') return { dot: 'dot-tools', kind: 'tools' };
        return { dot: 'dot-other', kind: ch || 'event' };
      }

      function summarizeEvent(event) {
        const summary = event.summary || '';
        const mode = event.mode || '';
        if (event.channel === 'system') {
          if (mode === 'report') return '测试完成后的结果摘要';
          if (mode === 'complete') return '运行完成';
          if (mode === 'session-save') return summary;
          return '系统状态';
        }
        return summary.length > 200 ? summary.slice(0, 200) + '...' : summary;
      }

      function detailForEvent(event) {
        const summary = event.summary || '';
        const raw = summary;
        const node = event.node || '';
        const toolName = event.tool_name || '';

        if (event.channel === 'tools') {
          if (summary.includes('artifact saved') || (summary.startsWith('{') && summary.includes('"snapshot"'))) return '证据已落盘';
          if (summary === '<no output> [Command succeeded with exit code 0]') return '页面操作已完成';
          if (summary.startsWith('No matches found')) return '搜索结果';
          if (node === 'model') return 'Agent 输出';
        }

        const toolLabels = {
          read_file: '读取产物文件',
          write_file: '写入文件',
          capture_snapshot: '采集页面快照',
          capture_screenshot: '额外截图',
          ls: '查看目录',
          glob: '查找文件',
        };
        if (toolName && toolLabels[toolName]) return toolLabels[toolName];

        if (event.channel === 'tools') {
          if (raw.includes('[Command succeeded with exit code 0]')) return '页面操作执行成功。';
          if (raw.startsWith('No matches found')) return '未搜索到匹配内容。';
          if (raw.includes('type: snapshot') && raw.includes('type: screenshot')) return '已保存页面快照，并自动补充了一张对应截图。';
          if (raw.includes('type: snapshot')) return '已保存页面快照。';
          if (raw.includes('type: screenshot')) return '已保存页面截图。';
          if (raw.includes('playwright-cli') || raw.includes('browser_action')) return 'Playwright 页面操作已执行完成。';
          if (toolName === 'read_file' && raw.includes('snapshot')) return '已读取页面快照片段，正在检查页面状态。';
          if (toolName === 'read_file') return '已读取产物文件内容，正在分析页面细节。';
        }
        return '';
      }

      function renderEvent(event) {
        const info = classifyEvent(event);
        const title = detailForEvent(event);
        const summary = summarizeEvent(event);
        const meta = [];
        if (event.tool_name) meta.push(event.tool_name);
        if (event.node) meta.push(event.node);
        if (event.run_id) meta.push(event.run_id);

        return `
          <div class="log-entry ${event.mode === 'report' ? 'report-card' : ''}">
            <div class="log-top">
              <div class="log-kind"><span class="log-dot ${info.dot}"></span>${escapeHtml(info.kind)}</div>
              <div class="log-time">${escapeHtml(formatTime(event.timestamp || ''))}</div>
            </div>
            <div class="log-title">${escapeHtml(title)}</div>
            <div class="log-summary">${escapeHtml(summary)}</div>
            <div class="log-meta">${escapeHtml(meta.join(' \u00b7 '))}</div>
          </div>`;
      }

      function clearEvents() {
        eventList.innerHTML = '<div class="log-empty">启动运行后，这里会实时显示结构化日志。</div>';
      }

      function appendEvent(event) {
        if (!event) return;
        if (event.id) {
          const nextId = Number(event.id) || 0;
          if (nextId && nextId <= state.lastEventId) return;
          state.lastEventId = Math.max(state.lastEventId, nextId);
        }
        if (eventList.querySelector('.log-empty')) eventList.innerHTML = '';
        eventList.insertAdjacentHTML('beforeend', renderEvent(event));
        eventList.scrollTop = eventList.scrollHeight;
      }

      function resetPreview() {
        previewBox.innerHTML = `
          <div class="empty-state">
            <strong>暂无截图</strong>
            启动运行后，这里会持续刷新最新浏览器画面。
          </div>`;
        openScreenshotLink.style.display = 'none';
        state.lastScreenshotPath = null;
      }

      async function fetchJsonOrThrow(url, options = undefined) {
        const res = await fetch(url, options);
        const contentType = res.headers.get('content-type') || '';
        const isJson = contentType.includes('application/json');
        const data = isJson ? await res.json() : await res.text();
        if (!res.ok) {
          const detail = isJson
            ? (data.detail || data.error || JSON.stringify(data))
            : String(data || res.statusText || '请求失败');
          throw new Error(detail);
        }
        return data;
      }

      function stopEventPolling() {
        if (state.eventPollTimer) {
          clearInterval(state.eventPollTimer);
          state.eventPollTimer = null;
        }
      }

      async function backfillEvents() {
        if (!state.currentRunId) return;
        try {
          const data = await fetchJsonOrThrow(`/api/runs/${state.currentRunId}/events`);
          const events = Array.isArray(data.events) ? data.events : [];
          for (const event of events) handleRealtimeEvent(event);
          if (data.status && ['completed', 'failed', 'cancelled'].includes(data.status)) {
            stopEventPolling();
          }
        } catch (error) {
          hint.textContent = `日志回退拉取失败：${error.message || error}`;
        }
      }

      function startEventPolling() {
        stopEventPolling();
        backfillEvents();
        state.eventPollTimer = setInterval(backfillEvents, 3000);
      }

      async function loadDefaults() {
        const data = await fetchJsonOrThrow('/api/defaults');
        urlInput.value = data.default_url || '';
        scenarioInput.value = data.scenario || '';
        if (data.session) {
          document.getElementById('autoLoad').checked = !!data.session.auto_load;
          document.getElementById('autoSave').checked = !!data.session.auto_save;
          document.getElementById('sessionAccountId').value = data.session.account_id || '';
        }
      }

      async function loadLatestRunMeta(preferredRunId = null) {
        const data = await fetchJsonOrThrow('/api/runs');
        const runs = data.runs || [];
        const run = preferredRunId
          ? runs.find(item => item.run_id === preferredRunId)
          : runs[0];
        if (!run) {
          state.currentRunId = null;
          runIdText.textContent = '-';
          runUrlText.textContent = urlInput.value || '-';
          setStatus('idle', '等待启动');
          return null;
        }
        state.currentRunId = run.run_id;
        runIdText.textContent = run.run_id;
        runUrlText.textContent = run.url || '-';
        setStatus(run.status || 'idle', `${run.status || 'idle'} \u00b7 ${run.url || ''}`.trim());
        return run;
      }

      async function pollScreenshot() {
        if (!state.currentRunId) return;
        try {
          const data = await fetchJsonOrThrow(`/api/runs/${state.currentRunId}/latest-screenshot`);
          if (data.path && data.path !== state.lastScreenshotPath) {
            state.lastScreenshotPath = data.path;
            const ts = Date.now();
            previewBox.innerHTML = `<img src="${data.path}?t=${ts}" alt="screenshot" style="width:100%;border-radius:12px" />`;
            openScreenshotLink.href = data.path;
            openScreenshotLink.style.display = 'inline';
          }
        } catch {}
      }

      function startScreenshotPolling() {
        stopScreenshotPolling();
        pollScreenshot();
        state.screenshotTimer = setInterval(pollScreenshot, 3000);
      }

      function stopScreenshotPolling() {
        if (state.screenshotTimer) {
          clearInterval(state.screenshotTimer);
          state.screenshotTimer = null;
        }
      }

      function handleRealtimeEvent(event) {
        if (!event || event.event === 'keepalive' || event.event === 'pong') return;
        if (event.event === 'cancelled') {
          setStatus('failed', '运行已取消');
          stopEventPolling();
          return;
        }
        appendEvent(event);
        if (event.channel === 'system') {
          if (event.mode === 'start') setStatus('running', '正在执行测试');
          if (event.mode === 'error') {
            setStatus('failed', event.summary || '运行失败');
            stopEventPolling();
          }
          if (event.mode === 'complete' || event.mode === 'status') {
            setStatus('completed', '测试完成');
            stopEventPolling();
          }
        }
      }

      function connectSSE(runId) {
        if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
        const es = new EventSource(`/api/run/${runId}/stream`);
        state.eventSource = es;
        es.addEventListener('message', (e) => {
          try {
            handleRealtimeEvent(JSON.parse(e.data));
          } catch {}
        });
        es.onerror = () => {
          es.close();
          state.eventSource = null;
          hint.textContent = '实时日志连接中断，已切换为轮询回退。';
          startEventPolling();
        };
      }


      async function hydrateRun(runId) {
        if (!runId) throw new Error('后端未返回有效 run_id');
        state.currentRunId = runId;
        state.lastEventId = 0;
        runIdText.textContent = runId;
        clearEvents();
        resetPreview();
        startScreenshotPolling();
        startEventPolling();
        connectSSE(runId);
      }

      startBtn.addEventListener('click', async () => {
        try {
          startBtn.disabled = true;
          startBtn.textContent = '启动中...';
          stopEventPolling();
          clearEvents();
          resetPreview();
          state.lastEventId = 0;
          setStatus('queued', '正在创建运行');

          const data = await fetchJsonOrThrow('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: urlInput.value.trim(),
              scenario: scenarioInput.value,
              session: {
                auto_load: document.getElementById('autoLoad').checked,
                auto_save: document.getElementById('autoSave').checked,
                account_id: document.getElementById('sessionAccountId').value.trim() || null,
              },
            }),
          });
          const runId = data.run && data.run.run_id;
          if (!runId) throw new Error('创建运行成功，但响应中缺少 run_id');
          hint.textContent = '运行已启动，正在实时接收日志和截图。';
          await hydrateRun(runId);
        } catch (error) {
          setStatus('failed', '启动失败');
          hint.textContent = `启动失败：${error.message || error}`;
        } finally {
          startBtn.disabled = false;
          startBtn.textContent = '启动运行';
        }
      });

      resetBtn.addEventListener('click', () => {
        if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
        stopEventPolling();
        stopScreenshotPolling();
        state.currentRunId = null;
        state.lastEventId = 0;
        clearEvents();
        resetPreview();
        runIdText.textContent = '-';
        runUrlText.textContent = urlInput.value || '-';
        setStatus('idle', '等待启动');
        loadDefaults();
        hint.textContent = '支持模糊描述，也支持结构化 JSON steps。';
      });

      (async () => {
        await loadDefaults();
        const run = await loadLatestRunMeta();
        if (run && run.status === 'running') {
          hint.textContent = '已自动连接到当前正在执行的 run。';
          await hydrateRun(run.run_id);
        }
      })();

      // ── WebSocket 连接（可选，比 SSE 更强大） ──────
      function connectWS(runId) {
        if (state.ws) { state.ws.close(); state.ws = null; }
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${location.host}/api/ws/run/${runId}`);
        state.ws = ws;
        ws.onmessage = (e) => {
          try {
            const event = JSON.parse(e.data);
            if (event.event === 'keepalive' || event.event === 'pong') return;
            if (event.event === 'cancelled') {
              setStatus('failed', '运行已取消');
              return;
            }
            appendEvent(event);
            if (event.channel === 'system') {
              if (event.mode === 'start') setStatus('running', '正在执行测试');
              if (event.mode === 'error') setStatus('failed', event.summary || '运行失败');
              if (event.mode === 'complete' || event.mode === 'status') setStatus('completed', '测试完成');
            }
          } catch {}
        };
        ws.onclose = () => { state.ws = null; };
        ws.onerror = () => { ws.close(); state.ws = null; };
      }

      // ── 取消运行（通过 WebSocket） ──────────────
      window.cancelRun = function() {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ action: 'cancel' }));
        }
      };

    </script>
  </body>
</html>
